<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --card: #f5f5f5;
    }

    body.dark {
      --bg: #111;
      --text: #fff;
      --card: #1e1e1e;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      background: var(--card);
      padding: 10px;
      display: flex;
      justify-content: space-between;
    }

    nav a {
      margin: 10px;
      text-decoration: none;
      color: var(--text);
    }

    section {
      padding: 40px;
    }

    .card {
      background: var(--card);
      padding: 15px;
      margin: 10px 0;
    }

    .hidden { display: none; }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }

    button { padding: 8px 15px; }

    .error { color: red; }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
  <button id="themeToggle">🌙</button>
</header>

<main>

<section id="home"><h1>Welcome</h1></section>
<section id="about"><h2>About Me</h2></section>
<section id="skills"><h2>Skills</h2></section>
<section id="projects"><h2>Projects</h2></section>

<section id="contact">
  <h2>Contact Me</h2>
  <form id="contactForm">
    <input type="text" id="name" placeholder="Name" required />
    <input type="email" id="email" placeholder="Email" required />
    <div id="emailError" class="error"></div>
    <textarea id="message" placeholder="Message" required></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<section id="admin">
  <h2>Admin</h2>
  <div id="login">
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>

  <div id="dashboard" class="hidden">
    <h3>Responses</h3>
    <div id="responses"></div>
  </div>
</section>

</main>

<script>

// Smooth scroll
document.querySelectorAll('nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelector(a.getAttribute('href')).scrollIntoView({behavior:'smooth'});
  });
});

// Theme toggle
const toggle = document.getElementById('themeToggle');
if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark');

toggle.onclick = () => {
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light');
}

// Form
const form = document.getElementById('contactForm');
form.addEventListener('submit', e => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const error = document.getElementById('emailError');

  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!regex.test(email)) {
    error.textContent = 'Invalid email';
    return;
  }
  error.textContent = '';

  const data = {
    name: document.getElementById('name').value,
    email,
    message: document.getElementById('message').value,
    time: new Date().toLocaleString()
  };

  let messages = JSON.parse(localStorage.getItem('messages')) || [];
  messages.push(data);
  localStorage.setItem('messages', JSON.stringify(messages));

  form.reset();
  alert('Message saved');
});

// Admin login
function login() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;

  if(u==='admin' && p==='1234') {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadMessages();
  } else {
    alert('Wrong credentials');
  }
}

function loadMessages() {
  const container = document.getElementById('responses');
  const messages = JSON.parse(localStorage.getItem('messages')) || [];

  container.innerHTML = messages.map(m => `
    <div class="card">
      <p><strong>${m.name}</strong> (${m.email})</p>
      <p>${m.message}</p>
      <small>${m.time}</small>
    </div>
  `).join('');
}

</script>

</body>
</html>
